spring.application.name=user-service

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/userdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=900000

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
app.refresh-token.expiration-ms=1296000000


# Expose the health endpoint (already public, per SecurityFilterChain).
# "always" shows full component-level detail (db, redis, diskSpace,
# etc.) rather than just a bare {"status":"UP"} — genuinely useful for
# debugging in a real deployment, where you want to know WHICH
# dependency is down, not just that "something" is wrong.
management.endpoint.health.show-details=always

# Explicitly enable the health indicators for our two real dependencies.
# Spring Boot auto-detects these are on the classpath and wires up
# health checks for them automatically — this just makes that explicit
# and intentional rather than relying purely on auto-detection.
management.health.db.enabled=true
management.health.redis.enabled=true