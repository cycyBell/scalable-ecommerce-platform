name: APIsec Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '24 11 * * 5' # Runs every Friday at 11:24 AM UTC
  workflow_dispatch:      # Allows manually triggering the run from the UI

permissions:
  contents: read

jobs:
  Trigger_APIsec_scan:
    permissions:
      security-events: write  # Required to upload the SARIF scan results
      actions: read           # Required for private repositories to fetch status
    runs-on: ubuntu-latest

    steps:
       - name: Checkout repository
         uses: actions/checkout@v4

       # Triggers the on-demand playbooks registered in your APIsec dashboard
       - name: APIsec scan
         uses: apisec-inc/apisec-run-scan@v1.0.7
         with:
           apisec-username: ${{ secrets.apisec_username }}
           apisec-password: ${{ secrets.apisec_password }}
           # Replace "user-service" with the exact name you gave this API project inside cloud.apisec.ai
           apisec-project: "user-service" 
           sarif-result-file: "apisec-results.sarif"

       # Uploads the dynamic penetration testing results straight into GitHub Security Center
       - name: Import results
         uses: github/codeql-action/upload-sarif@v3
         with:
           sarif_file: ./apisec-results.sarif
